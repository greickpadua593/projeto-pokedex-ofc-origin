    <!-- Grookey Details -->
    <div id="detalhesGrookey" style="display:none; background:#f4f4f4; border-radius:10px; padding:20px; margin:20px auto; max-width:400px; box-shadow:0 2px 8px #0002;">
        <h2>Detalhes do Grookey</h2>
        <p>Grookey é um Pokémon do tipo Grama, conhecido por sua habilidade de controlar a natureza. Ele é um dos Pokémon iniciais da região de Galar!</p>
        <ul>
            <li>Tipo: Grama</li>
            <li>Altura: 0,4m</li>
            <li>Peso: 5kg</li>
        </ul>
        <button id="btnVoltar" style="margin-top:15px;">Voltar</button>
    </div>
    <script>
        document.getElementById('btnDetalhes').onclick = function() {
            document.getElementById('detalhesGrookey').style.display = 'block';
            window.scrollTo({top: document.getElementById('detalhesGrookey').offsetTop, behavior: 'smooth'});
        };
        document.getElementById('btnVoltar').onclick = function() {
            document.getElementById('detalhesGrookey').style.display = 'none';
        };
    </script>
